services:
  family-bible-study-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - /opt/family-bible-study-api/.env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      MODEL_BASE_URL: https://openrouter.ai/api/v1
      MODEL_ALLOWED_HOSTS: openrouter.ai
      STUDY_MODEL: openai/gpt-5.6-terra
      STUDY_MAX_TOKENS: 256
      PUBLIC_ORIGIN: https://angelolockdev.github.io
      TRUST_PROXY: "false"
      RATE_LIMIT_MAX: 5
      RATE_LIMIT_WINDOW_MS: 900000
      GLOBAL_RATE_LIMIT_MAX: 20
      GLOBAL_RATE_LIMIT_WINDOW_MS: 3600000
      MAX_CONCURRENT_GENERATIONS: 2
    networks:
      - coolify
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    labels:
      traefik.enable: "true"
      traefik.docker.network: coolify
      traefik.http.routers.family-bible-study-api.rule: Host(`bible-api.159.195.148.88.sslip.io`)
      traefik.http.routers.family-bible-study-api.entrypoints: https
      traefik.http.routers.family-bible-study-api.tls: "true"
      traefik.http.routers.family-bible-study-api.tls.certresolver: letsencrypt
      traefik.http.middlewares.family-bible-study-api-headers.headers.customresponseheaders.X-Content-Type-Options: nosniff
      traefik.http.middlewares.family-bible-study-api-headers.headers.customresponseheaders.X-Frame-Options: DENY
      traefik.http.middlewares.family-bible-study-api-headers.headers.customresponseheaders.Referrer-Policy: no-referrer
      traefik.http.routers.family-bible-study-api.middlewares: family-bible-study-api-headers
      traefik.http.services.family-bible-study-api.loadbalancer.server.port: "3000"

networks:
  coolify:
    external: true
